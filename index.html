body{display:flex;justify-content:center}
.phone{position:relative;width:100%;max-width:560px;min-height:100svh;background:#071017;overflow:visible}
.stage{position:relative;width:100%;line-height:0;background:#071017;overflow:visible}
.bg{display:block;width:100%;height:auto;user-select:none;pointer-events:none}

.sheetBack.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:560px;z-index:20001;max-height:73svh;overflow:auto;background:linear-gradient(180deg,rgba(24,32,40,.98),rgba(6,11,17,.99));border:1px solid rgba(247,216,137,.28);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:0 -24px 60px rgba(0,0,0,.55);padding:18px 18px calc(24px + env(safe-area-inset-bottom));transition:.26s}
.sheet.show{transform:translate(-50%,0)}
.grab{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.26);margin:0 auto 14px}
.close{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.23);background:rgba(255,255,255,.08);color:#fff;font-size:22px}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.sheet.explore-sheet h2{font-size:23px;line-height:1.1;letter-spacing:-.055em;color:#fff7de}
.sheet.explore-sheet .meta{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(247,216,137,.10);border:1px solid rgba(247,216,137,.24);color:#f7d889;font-size:12.5px;margin-bottom:13px}
.exploreWrap{display:grid;gap:10px;margin-top:4px;line-height:1.45}
.exploreCard{border:1px solid rgba(255,255,255,.11);border-radius:18px;padding:13px 13px 12px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.038));box-shadow:0 10px 26px rgba(0,0,0,.20)}
.exploreCard.question{border-color:rgba(247,216,137,.34);background:radial-gradient(circle at top left,rgba(247,216,137,.20),rgba(255,255,255,.06) 55%,rgba(255,255,255,.035))}
.exploreLabel{display:flex;align-items:center;gap:7px;margin-bottom:8px;color:#f7d889;font-weight:950;font-size:13px;letter-spacing:-.02em}
.exploreText{color:rgba(255,255,255,.90);font-size:14.5px;line-height:1.62;font-weight:720;letter-spacing:-.045em;word-break:keep-all}
.exploreText.strong{font-size:17px;color:#fff3c4;font-weight:950;line-height:1.45}
.flowLine{display:grid;gap:5px;justify-items:center;margin-top:4px;color:#fff}
.flowNode{width:100%;text-align:center;border:1px solid rgba(247,216,137,.20);background:rgba(247,216,137,.075);border-radius:13px;padding:9px 10px;color:#ffe8a8;font-weight:900;font-size:13.5px;line-height:1.25;letter-spacing:-.045em}
.flowArrow{color:#f7d889;font-weight:950;opacity:.9;line-height:1}
.thinkBox{border-color:rgba(120,190,255,.24);background:linear-gradient(180deg,rgba(70,130,180,.13),rgba(255,255,255,.04))}
.sheet.explore-sheet .chips{margin-top:12px}
.sheet.explore-sheet .chip{font-size:12.5px;padding:7px 10px}

<style>
/* === CEN fixed footer + EXODUS-style scroll limit patch ===
   원칙: patriarch-main.png 848x1540 원본 유지, v3 허브 유지,
   body 전체 스크롤이 아니라 메인 화면(.phone.main-content)만 footer 위에서 스크롤. */
:root {
  --cen-footer-ratio: 0.37146226; /* 315 / 848 */
  --cen-max-width: 560px;
  --cen-footer-h: clamp(118px, 37.15vw, 208px);
}
html, body {
  width: 100% !important;
  height: 100% !important;
  min-height: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  background: #020b10 !important;
  overscroll-behavior: none !important;
}
body {
  position: fixed !important;
  inset: 0 !important;
  display: block !important;
  justify-content: initial !important;
  touch-action: none !important;
}
.app-container {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  min-height: 0 !important;
  overflow: hidden !important;
  display: block !important;
  background: #020b10 !important;
}
.phone.main-content {
  position: fixed !important;
  left: 50% !important;
  top: 0 !important;
  bottom: calc(var(--cen-footer-h) + env(safe-area-inset-bottom)) !important;
  transform: translateX(-50%) !important;
  width: 100% !important;
  max-width: var(--cen-max-width) !important;
  height: auto !important;
  min-height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow-x: hidden !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
  overscroll-behavior-y: contain !important;
  touch-action: pan-y !important;
  scrollbar-width: none !important;
  background: #020b10 !important;
}
.phone.main-content::-webkit-scrollbar { display: none !important; }
.stage.card-grid {
  position: relative !important;
  display: block !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  line-height: 0 !important;
  overflow: visible !important;
  touch-action: pan-y !important;
  background: #020b10 !important;
}
.stage.card-grid .bg {
  display: block !important;
  width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  user-select: none !important;
  pointer-events: none !important;
}
.stage.card-grid .hot {
  touch-action: manipulation !important;
}
.stage.card-grid .e1,
.stage.card-grid .e2,
.stage.card-grid .e3,
.stage.card-grid .e4,
.stage.card-grid .e5 {
  pointer-events: none !important;
}
.cen-fixed-footer {
  position: fixed !important;
  left: 50% !important;
  bottom: 0 !important;
  width: 100% !important;
  max-width: var(--cen-max-width) !important;
  transform: translateX(-50%) !important;
  z-index: 9999 !important;
  pointer-events: none !important;
  background: #020b10 !important;
  line-height: 0 !important;
  box-shadow: 0 -18px 28px rgba(0,0,0,.52) !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
  touch-action: manipulation !important;
}
.cen-fixed-footer::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: -7px;
  height: 7px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(2,11,16,0), rgba(2,11,16,.72));
}
.cen-fixed-footer img {
  display: block !important;
  width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
}
.cen-fixed-footer .footer-hot {
  position: absolute;
  pointer-events: auto !important;
  cursor: pointer;
  border: 0;
  background: transparent;
  color: transparent;
  font-size: 0;
  line-height: 0;
  padding: 0;
  margin: 0;
  touch-action: manipulation !important;
}
/* footer image = 848 x 315 */
.cen-fixed-footer .fh-home { left: 0.5%; bottom: 0.5%; width: 17.4%; height: 48.5%; }
.cen-fixed-footer .fh-all { left: 18.8%; bottom: 0.5%; width: 18.3%; height: 48.5%; }
.cen-fixed-footer .fh-hub { left: 38.5%; bottom: 0.5%; width: 18.3%; height: 48.5%; }
.cen-fixed-footer .fh-prev { left: 58.0%; bottom: 0.5%; width: 18.4%; height: 48.5%; }
.cen-fixed-footer .fh-next { left: 77.3%; bottom: 0.5%; width: 22.1%; height: 48.5%; }
.sheet, .sheetBack, .toast {
  touch-action: auto !important;
}

/* modal must appear above fixed footer and physically open above it */
.sheetBack {
  position: fixed !important;
  inset: 0 !important;
  z-index: 2147483600 !important;
  pointer-events: none;
}
.sheetBack.show { pointer-events: auto !important; }
.sheet {
  position: fixed !important;
  left: 50% !important;
  bottom: calc(var(--cen-footer-h) + env(safe-area-inset-bottom) + 6px) !important;
  transform: translate(-50%, calc(100% + var(--cen-footer-h) + 20px)) !important;
  z-index: 2147483601 !important;
  max-height: calc(100svh - var(--cen-footer-h) - env(safe-area-inset-bottom) - 28px) !important;
  pointer-events: auto !important;
}
.sheet.show { transform: translate(-50%, 0) !important; }
.toast { z-index: 2147483602 !important; }
.cen-fixed-footer { z-index: 1000 !important; }
body.sheet-open .cen-fixed-footer { pointer-events: none !important; z-index: 1000 !important; }
body.sheet-open .phone.main-content { pointer-events: none !important; }
body.sheet-open .sheet, body.sheet-open .sheetBack { pointer-events: auto !important; }
</style>

</head>
