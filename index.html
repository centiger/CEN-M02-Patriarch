<style>

/* 사건 전체 클릭 영역 */
.e1,.e2,.e3,.e4,.e5{pointer-events:none}

.e2{left:0.5%;top:25.0%;width:43.5%;height:15.0%}

.b2a{left:44.2%;top:41.25%;width:17.1%;height:4.30%}
.b2b{left:62.1%;top:41.25%;width:17.1%;height:4.30%}
.b2c{left:79.9%;top:41.25%;width:16.8%;height:4.30%}

.b3a{left:44.2%;top:58.90%;width:17.1%;height:4.30%}
.b3b{left:62.1%;top:58.90%;width:17.1%;height:4.30%}
.b3c{left:79.9%;top:58.90%;width:16.8%;height:4.30%}

.b4a{left:44.2%;top:76.00%;width:17.1%;height:4.30%}

/* 하단 메뉴 */
.nhome{left:2.0%;top:92.95%;width:15.5%;height:5.7%}
.nall{left:18.5%;top:92.95%;width:17.0%;height:5.7%}
.nhub{left:37.0%;top:92.95%;width:20.0%;height:5.7%}

.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.48);opacity:0;pointer-events:none;transition:.22s;z-index:20000}
.sheetBack.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:560px;z-index:20001;max-height:73svh;overflow:auto;background:linear-gradient(180deg,rgba(24,32,40,.98),rgba(6,11,17,.99));border:1px solid rgba(247,216,137,.28);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:0 -24px 60px rgba(0,0,0,.55);padding:18px 18px calc(24px + env(safe-area-inset-bottom));transition:.26s}
.sheet.show{transform:translate(-50%,0)}
.grab{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.26);margin:0 auto 14px}
.close{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.23);background:rgba(255,255,255,.08);color:#fff;font-size:22px}
.sheet h2{margin:0 44px 5px 0;font-size:24px;color:#fff}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<style>
/* === CEN fixed footer + EXODUS-style scroll limit patch ===
   원칙: patriarch-main.png 848x1540 원본 유지, v3 허브 유지,
   body 전체 스크롤이 아니라 메인 화면(.phone.main-content)만 footer 위에서 스크롤. */
:root {
  --cen-footer-ratio: 0.37146226; /* 315 / 848 */
  --cen-max-width: 560px;
  --cen-footer-h: clamp(118px, 37.15vw, 208px);
}
html, body {
  width: 100% !important;
  height: 100% !important;
  min-height: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  background: #020b10 !important;
  overscroll-behavior: none !important;
}
body {
  position: fixed !important;
  inset: 0 !important;
  display: block !important;
  justify-content: initial !important;
  touch-action: none !important;
}
.app-container {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  min-height: 0 !important;
  overflow: hidden !important;
  display: block !important;
  background: #020b10 !important;
}
.phone.main-content {
  position: fixed !important;
  left: 50% !important;
  top: 0 !important;
  bottom: calc(var(--cen-footer-h) + env(safe-area-inset-bottom)) !important;
  transform: translateX(-50%) !important;
  width: 100% !important;
  max-width: var(--cen-max-width) !important;
  height: auto !important;
  min-height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow-x: hidden !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
  overscroll-behavior-y: contain !important;
  touch-action: pan-y !important;
  scrollbar-width: none !important;
  background: #020b10 !important;
}
.phone.main-content::-webkit-scrollbar { display: none !important; }
.stage.card-grid {
  position: relative !important;
  display: block !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  line-height: 0 !important;
  overflow: visible !important;
  touch-action: pan-y !important;
  background: #020b10 !important;
}
.stage.card-grid .bg {
  display: block !important;
  width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  user-select: none !important;
  pointer-events: none !important;
}
.stage.card-grid .hot {
  touch-action: manipulation !important;
}
.stage.card-grid .e1,
.stage.card-grid .e2,
.stage.card-grid .e3,
.stage.card-grid .e4,
.stage.card-grid .e5 {
  pointer-events: none !important;
}
.cen-fixed-footer {
  position: fixed !important;
  left: 50% !important;
  bottom: 0 !important;
  width: 100% !important;
  max-width: var(--cen-max-width) !important;
  transform: translateX(-50%) !important;
  z-index: 9999 !important;
  pointer-events: none !important;
  background: #020b10 !important;
  line-height: 0 !important;
  box-shadow: 0 -18px 28px rgba(0,0,0,.52) !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
  touch-action: manipulation !important;
}
.cen-fixed-footer::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: -7px;
  height: 7px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(2,11,16,0), rgba(2,11,16,.72));
}
.cen-fixed-footer img {
  display: block !important;
  width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
}
.cen-fixed-footer .footer-hot {
  position: absolute;
  pointer-events: auto !important;
  cursor: pointer;
  border: 0;
  background: transparent;
  color: transparent;
  font-size: 0;
  line-height: 0;
  padding: 0;
  margin: 0;
  touch-action: manipulation !important;
}
/* footer image = 848 x 315 */
.cen-fixed-footer .fh-home { left: 0.5%; bottom: 0.5%; width: 17.4%; height: 48.5%; }
.cen-fixed-footer .fh-all { left: 18.8%; bottom: 0.5%; width: 18.3%; height: 48.5%; }
.cen-fixed-footer .fh-hub { left: 38.5%; bottom: 0.5%; width: 18.3%; height: 48.5%; }
.cen-fixed-footer .fh-prev { left: 58.0%; bottom: 0.5%; width: 18.4%; height: 48.5%; }
.cen-fixed-footer .fh-next { left: 77.3%; bottom: 0.5%; width: 22.1%; height: 48.5%; }
.sheet, .sheetBack, .toast {
  touch-action: auto !important;
}

/* modal must appear above fixed footer and physically open above it */
.sheetBack {
  position: fixed !important;
  inset: 0 !important;
  z-index: 2147483600 !important;
  pointer-events: none;
}
.sheetBack.show { pointer-events: auto !important; }
.sheet {
  position: fixed !important;
  left: 50% !important;
  bottom: calc(var(--cen-footer-h) + env(safe-area-inset-bottom) + 6px) !important;
  transform: translate(-50%, calc(100% + var(--cen-footer-h) + 20px)) !important;
  z-index: 2147483601 !important;
  max-height: calc(100svh - var(--cen-footer-h) - env(safe-area-inset-bottom) - 28px) !important;
  pointer-events: auto !important;
}
.sheet.show { transform: translate(-50%, 0) !important; }
.toast { z-index: 2147483602 !important; }
.cen-fixed-footer { z-index: 1000 !important; }
body.sheet-open .cen-fixed-footer { pointer-events: none !important; z-index: 1000 !important; }
body.sheet-open .phone.main-content { pointer-events: none !important; }
body.sheet-open .sheet, body.sheet-open .sheetBack { pointer-events: auto !important; }
</style>


<style id="CEN-UNIFIED-FOOTER-V5-CSS">
body{padding-bottom:92px!important}

<style id="CEN-FOOTER-HEIGHT-FIX-V5B">
:root{--cen-footer-h:92px!important;}
.phone.main-content{bottom:calc(92px + env(safe-area-inset-bottom))!important;}

<style id="CEN-BLACK-GAP-FIX-V5C">
/* v5c: 기존 하단 흐름/푸터 예약공간 제거 + 통합 네비게이터 기준으로 재정렬 */

.unifiedDock .coreFlow{margin-bottom:4px!important;}

<body>
<div class="app-container">
<main class="phone main-content">

<script>
const DATA={
abraham:{title:'아브라함 주제탐험',meta:'창 12:1-3',body:'하나님이 한 사람을 부르셔서 언약 백성의 시작을 여십니다.',chips:['부르심','가나안','별 언약','믿음']},
isaac:{title:'이삭 주제탐험',meta:'창 22, 26장',body:'이삭은 약속의 아들이며 언약 계승의 통로입니다.',chips:['약속의 아들','모리아산','순종']},
jacob:{title:'야곱 주제탐험',meta:'창 28, 32장',body:'야곱은 벧엘에서 하나님을 만나고 얍복강에서 이스라엘이라는 새 이름을 받습니다.',chips:['벧엘','얍복강','이스라엘']},
joseph:{title:'요셉 주제탐험',meta:'창 37-50장',body:'요셉의 꿈과 고난은 애굽 총리라는 섭리의 자리로 이어집니다.',chips:['꿈','고난','총리','가족구원']},
egypt:{title:'애굽 정착 주제탐험',meta:'창 46-50장, 출 1장',body:'야곱의 가족은 고센에 정착하여 번성합니다.',chips:['고센','번성','출애굽 준비']},
covenant:{title:'언약의 흐름',meta:'아브라함 → 이삭 → 야곱 → 요셉',body:'족장시대의 핵심은 언약의 계승입니다.',chips:['언약','계승','구속사']},
providence:{title:'섭리 탐험',meta:'요셉의 꿈과 애굽',body:'하나님은 고난까지도 생명을 보존하는 길로 사용하십니다.',chips:['섭리','용서','보존']},
hub:{title:'족장시대 허브 탐험',meta:'5개 허브',body:'아브라함, 이삭, 야곱, 요셉, 애굽 정착 허브로 구성되어 있습니다.',chips:['아브라함','이삭','야곱','요셉','애굽정착']},
exodus:{title:'다음 시대',meta:'출애굽·광야 Matrix',body:'애굽 정착은 출애굽 시대를 준비합니다.',chips:['모세','출애굽','광야']}
};
const sheet=document.getElementById('sheet'),backdrop=document.getElementById('backdrop'),title=document.getElementById('sheetTitle'),meta=document.getElementById('sheetMeta'),body=document.getElementById('sheetBody'),chips=document.getElementById('chips'),toast=document.getElementById('toast');
function goHub(id){location.href='./hubs/index.html?hub='+encodeURIComponent(id)+'&v=20260606-v3-modal-layer2'}
function openSheet(key){const d=DATA[key]||DATA.abraham;title.textContent=d.title;meta.textContent=d.meta;body.textContent=d.body;chips.innerHTML=d.chips.map(c=>`<span class="chip">${c}</span>`).join('');sheet.classList.add('show');backdrop.classList.add('show');document.body.classList.add('sheet-open')}
function closeSheet(){sheet.classList.remove('show');backdrop.classList.remove('show');document.body.classList.remove('sheet-open')}
document.getElementById('close').onclick=closeSheet;backdrop.onclick=closeSheet;

<script id="CEN-UNIFIED-FOOTER-V5-LINKS">
(function(){
  const links={
    timeline:'https://centiger.github.io/CEN-Chronology/?view=timeline',
    connect:'https://centiger.github.io/CEN-Chronology/',
    overview:'https://centiger.github.io/CEN-Bible2.0/#overview66'
  };
  document.addEventListener('click',function(e){
    const btn=e.target.closest && e.target.closest('.unifiedDock .action');
    if(!btn) return;
    const key=btn.dataset.link || btn.dataset.footer || '';
    if(key==='timeline'||key==='connect'||key==='overview'){
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
      location.href=links[key];
    }
  },true);
})();
</script>
